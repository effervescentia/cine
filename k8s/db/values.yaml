nameOverride: ""
fullnameOverride: ""

migration:
  image:
    repository: ''
    pullPolicy: IfNotPresent
    tag: ''

  postgres:
    hostname: db-cine-postgres
    port: 5432
    database: cine
    username: postgres

cine-postgres:
  auth:
    database: cine
    username: cine
    existingSecret: postgres-auth-secrets

  primary:
    extraEnvVarsSecret: postgres-primary-secrets
    extraEnvVars:
      - name: POSTGRESQL_PGAUDIT_LOG
        value: "all"

    initdb:
      user: postgres
      scripts:
        access.sql: |
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT ALL PRIVILEGES ON TABLES TO cine;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT ALL PRIVILEGES ON SEQUENCES TO cine;

cine-redis:
  architecture: standalone
  auth:
    existingSecret: redis-secrets
    existingSecretPasswordKey: redis-password
